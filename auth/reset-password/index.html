<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellmade – Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1A241F;
      color: #D5DDCA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 380px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.5;
      opacity: 0.8;
      margin-bottom: 24px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(213, 221, 202, 0.2);
      border-top-color: #D5DDCA;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #D5DDCA;
      color: #1A241F;
      text-decoration: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .btn:active { opacity: 0.8; }
    .hidden { display: none; }
    .fallback-msg {
      font-size: 13px;
      opacity: 0.6;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Opening Bellmade&hellip;</h1>
      <p>You should be redirected to the app automatically.</p>
    </div>

    <div id="fallback" class="hidden">
      <h1>Reset Your Password</h1>
      <p>Tap the button below to open Bellmade and reset your password.</p>
      <a id="open-btn" class="btn" href="#">Open Bellmade</a>
      <p class="fallback-msg">
        If nothing happens, make sure the Bellmade app is installed.
      </p>
    </div>
  </div>

  <script>
    (function () {
      var hash = window.location.hash || '';
      var appUrl = 'bellmade://auth/reset-password' + hash;

      document.getElementById('open-btn').href = appUrl;

      window.location.href = appUrl;

      setTimeout(function () {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fallback').classList.remove('hidden');
      }, 1500);
    })();
  </script>
</body>
</html>
